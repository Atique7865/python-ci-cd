name: Python CI-CD Pipeline 

on:
  push:
    branches:
      - main
      - dev

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8

      - name: Run Flake8
        run: flake8 .

  trivy-fs-scan:
    needs: [lint]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .

  build:
    needs: [trivy-fs-scan]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t python-ci-cd:${{ github.run_number }} .

  image-scan:
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t python-ci-cd:${{ github.run_number }} .

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: python-ci-cd:${{ github.run_number }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: '0'

  push:
    needs: [image-scan]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: atique123
          password: ${{ secrets.DOCKERHUB_PAT }}

      - name: Build Docker Image
        run: |
          docker build -t atique123/python-ci-cd:${{ github.run_number }} .

      - name: Push Docker Image
        run: |
          docker push atique123/python-ci-cd:${{ github.run_number }}